  name: NetworkDeserialize(WorldRunner, Peer, NetBuffer, T)
  nameWithType: INetSerializable<T>.NetworkDeserialize(WorldRunner, Peer, NetBuffer, T)
  fullName: Nebula.Serialization.INetSerializable<T>.NetworkDeserialize(Nebula.WorldRunner, ENet.Peer, Nebula.Serialization.NetBuffer, T)
  type: Method
  assemblies:
  - Nebula
  namespace: Nebula.Serialization
  summary: Deserialize an object from the network buffer.
  example: []
  syntax:
    content: public static abstract T NetworkDeserialize(WorldRunner currentWorld, Peer peer, NetBuffer buffer, T existing = null)
    parameters:
    - id: currentWorld
      type: Nebula.WorldRunner
      description: The current world runner
    - id: peer
      type: ENet.Peer
      description: The source peer
    - id: buffer
      type: Nebula.Serialization.NetBuffer
      description: The buffer to read from
    - id: existing
      type: '{T}'
      description: Optional existing instance to update (for delta encoding support)
    return:
      type: '{T}'
      description: The deserialized object (may be the updated existing instance or a new one)
    content.vb: Public Shared MustInherit Function NetworkDeserialize(currentWorld As WorldRunner, peer As Peer, buffer As NetBuffer, existing As T = Nothing) As T
