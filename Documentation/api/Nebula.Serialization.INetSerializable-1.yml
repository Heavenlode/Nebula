  type: Method
  assemblies:
  - Nebula
  namespace: Nebula.Serialization
  summary: >-
    Called when peer acknowledges receipt of data.

    Complex types should commit pending state to confirmed state.

    Simple types should no-op.
  example: []
  syntax:
    content: public static abstract void OnPeerAcknowledge(T obj, UUID peerId)
    parameters:
    - id: obj
      type: '{T}'
      description: The object instance
    - id: peerId
      type: Nebula.UUID
      description: The peer that acknowledged
    content.vb: Public Shared MustInherit Sub OnPeerAcknowledge(obj As T, peerId As UUID)
