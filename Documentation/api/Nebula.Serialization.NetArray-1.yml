  assemblies:
  - Nebula
  namespace: Nebula.Serialization
  summary: >-
    A network-synchronized array that tracks element-level changes for efficient delta sync.

    Only modified indices are sent over the network, significantly reducing bandwidth for large arrays.

    Implements INetPropertyBindable to notify parent NetworkController on internal mutations.
  example: []
  syntax:
    content: 'public sealed class NetArray<T> : INetSerializable<NetArray<T>>, INetPropertyBindable, IEnumerable<T>, IEnumerable where T : struct'
    typeParameters:
    - id: T
      description: Element type (must be a supported primitive or Godot struct)
    content.vb: Public NotInheritable Class NetArray(Of T As Structure) Implements INetSerializable(Of NetArray(Of T)), INetPropertyBindable, IEnumerable(Of T), IEnumerable
