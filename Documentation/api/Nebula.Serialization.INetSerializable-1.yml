  name: INetSerializable<T>
  nameWithType: INetSerializable<T>
  fullName: Nebula.Serialization.INetSerializable<T>
  type: Interface
  assemblies:
  - Nebula
  namespace: Nebula.Serialization
  summary: >-
    Interface for reference types (classes) that can be serialized/deserialized over the network.

    Implementations should use NetWriter/NetReader for strongly-typed, zero-allocation serialization.

    Objects implementing this interface own their per-peer state and self-filter during serialization.
  example: []
  syntax:
    content: 'public interface INetSerializable<T> where T : class'
    typeParameters:
    - id: T
      description: The type being serialized
    content.vb: Public Interface INetSerializable(Of T As Class)
  nameWithType.vb: INetSerializable(Of T)
  fullName.vb: Nebula.Serialization.INetSerializable(Of T)
  name.vb: INetSerializable(Of T)
- uid: Nebula.Serialization.INetSerializable`1.NetworkSerialize(Nebula.WorldRunner,ENet.Peer,`0,Nebula.Serialization.NetBuffer,System.Int32)
  commentId: M:Nebula.Serialization.INetSerializable`1.NetworkSerialize(Nebula.WorldRunner,ENet.Peer,`0,Nebula.Serialization.NetBuffer,System.Int32)
  id: NetworkSerialize(Nebula.WorldRunner,ENet.Peer,`0,Nebula.Serialization.NetBuffer,System.Int32)
  parent: Nebula.Serialization.INetSerializable`1
  langs:
  - csharp
  - vb
  name: NetworkSerialize(WorldRunner, Peer, T, NetBuffer, int)
  nameWithType: INetSerializable<T>.NetworkSerialize(WorldRunner, Peer, T, NetBuffer, int)
  fullName: Nebula.Serialization.INetSerializable<T>.NetworkSerialize(Nebula.WorldRunner, ENet.Peer, T, Nebula.Serialization.NetBuffer, int)
  type: Method
  assemblies:
  - Nebula
  namespace: Nebula.Serialization
  summary: >-
    Serialize the object to the network buffer.

    Returns true if data was written, false if nothing to send for this peer.

    Simple types (NetNode3D) ignore maxBytes and always return true.

    Complex types (NetArray) use maxBytes for chunking and return false when nothing to send.
  example: []
  syntax:
    content: public static abstract bool NetworkSerialize(WorldRunner currentWorld, Peer peer, T obj, NetBuffer buffer, int maxBytes)
    parameters:
    - id: currentWorld
      type: Nebula.WorldRunner
      description: The current world runner
    - id: peer
      type: ENet.Peer
      description: The target peer
    - id: obj
      type: '{T}'
      description: The object to serialize
    - id: buffer
      type: Nebula.Serialization.NetBuffer
      description: The buffer to write to
    - id: maxBytes
      type: System.Int32
      description: Maximum bytes to write (for chunked serialization). Simple types may ignore this.
    return:
      type: System.Boolean
      description: True if data was written, false if nothing to send
    content.vb: Public Shared MustInherit Function NetworkSerialize(currentWorld As WorldRunner, peer As Peer, obj As T, buffer As NetBuffer, maxBytes As Integer) As Boolean
  overload: Nebula.Serialization.INetSerializable`1.NetworkSerialize*
  nameWithType.vb: INetSerializable(Of T).NetworkSerialize(WorldRunner, Peer, T, NetBuffer, Integer)
  fullName.vb: Nebula.Serialization.INetSerializable(Of T).NetworkSerialize(Nebula.WorldRunner, ENet.Peer, T, Nebula.Serialization.NetBuffer, Integer)
  name.vb: NetworkSerialize(WorldRunner, Peer, T, NetBuffer, Integer)
